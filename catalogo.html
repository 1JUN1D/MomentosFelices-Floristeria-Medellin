<!DOCTYPE html>
<html lang="es-CO">
<head>
    <meta charset="UTF-8">
    
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-QTFYET3S8R"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-QTFYET3S8R');

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Catálogo completo de Momentos Felices en Medellín. Descubre nuestra colección de arreglos florales, ramos, bouquets y regalos especiales con entrega a domicilio.">
    <meta name="keywords" content="catálogo flores Medellín, ramos, bouquets, arreglos florales, Momentos Felices">
    <title>Catálogo de Flores - Momentos Felices Medellín | Ramos y Arreglos Florales</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/catalog.css?v=20260327f">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/logo.webp">
</head>
<body>
    <!-- Navbar -->
    <div id="navbar-container"></div>

    <!-- Hero Section -->
    <section class="catalog-hero">
        <div class="container">
            <h1>Nuestro Catálogo</h1>
            <p>Descubre nuestra amplia gama de composiciones florales exclusivas elaboradas con dedicación</p>
        </div>
    </section>

    <!-- Filters Section -->
    <section class="catalog-filters">
        <div class="container">
            <div class="filters-container">
                <span class="filter-label">Filtrar por:</span>
                <button class="filter-btn active" onclick="filterProducts('all')">Todos</button>
                <button class="filter-btn" onclick="filterProducts('Ramilletes')">Ramilletes</button>
                <button class="filter-btn" onclick="filterProducts('Cajas y Corazones')">Cajas y Corazones</button>
                <button class="filter-btn" onclick="filterProducts('Rosas Eternas')">Rosas Eternas</button>
                <button class="filter-btn" onclick="filterProducts('Ramos Grandes')">Ramos Grandes</button>
                <button class="filter-btn" onclick="filterProducts('Coreanos')">Coreanos</button>
                <button class="filter-btn" onclick="filterProducts('Ramos Fúnebres')">Fúnebres</button>
                <button class="filter-btn" onclick="filterProducts('Peluches')">Peluches</button>
                <button class="filter-btn" onclick="filterProducts('Cilindros')">Cilindros</button>
                <button class="filter-btn" onclick="filterProducts('Flores Importadas')">Importadas</button>
                <button class="filter-btn" onclick="filterProducts('Desayuno Sorpresa')">Desayunos</button>
                <button class="filter-btn" onclick="filterProducts('Grados')">Grados</button>
            </div>
        </div>
    </section>

    <!-- Products Grid -->
    <section class="catalog-section">
        <div class="container">
            <div class="results-counter" id="resultsCounter"></div>
            <div class="products-grid" id="productsGrid">
                <!-- Los productos se cargarán con JavaScript -->
            </div>
            <div class="empty-state" id="emptyState">
                <h3>No se encontraron productos</h3>
                <p>Prueba con una búsqueda diferente</p>
            </div>
        </div>
    </section>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <div class="lightbox-content" onclick="event.stopPropagation()">
            <button class="lightbox-close" onclick="closeLightbox()">×</button>
            <img src="" alt="" class="lightbox-image" id="lightboxImage">
            <div class="lightbox-info">
                <h3 id="lightboxTitle"></h3>
                <p id="lightboxPrice"></p>
            </div>
        </div>
    </div>

    <!-- Scroll to Top -->
    <button class="scroll-top" id="scrollTop" onclick="scrollToTop()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"/>
        </svg>
    </button>

    <!-- Footer -->
    <div id="footer-container"></div>

    <!-- WhatsApp Button -->
    <div id="whatsapp-button-container"></div>

    <script src="js/script.js"></script>
    <script src="js/catalog-data.js?v=20260327f"></script>
    <script src="js/catalog.js?v=20260327f"></script>
</body>
</html>
